name: Nub Setup

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nub-setup:
    name: Nub setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Setup Nub and project Node
        uses: nubjs/setup-nub@47e5e7393d50f4e9544ddaf756aa277972afba2d
        with:
          nub-version: 0.2.10

      - name: Show toolchain
        shell: bash
        run: |
          set -euo pipefail
          nub --version
          node --version
          nub node which

      - name: Install dependencies
        shell: bash
        run: nub install --frozen-lockfile

      - name: Verify setup tests
        shell: bash
        run: nub run --node test:setup

      - name: Verify typecheck
        shell: bash
        run: nub run --node typecheck

      - name: Verify quality harness
        shell: bash
        run: nub run --node check:all

      - name: Verify build
        shell: bash
        run: nub run --node build

      - name: Verify install readiness
        shell: bash
        run: scripts/node-run.sh scripts/verify-install.mjs

      - name: Verify unit tests
        shell: bash
        run: nub run --node test:unit
