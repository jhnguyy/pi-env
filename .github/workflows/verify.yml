name: Nub Setup

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nub-setup:
    name: Nub setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Setup Nub and project Node
        uses: nubjs/setup-nub@45fe48f651d367e68a42bd886a42e93d696f0a24
        with:
          nub-version: 0.2.10

      - name: Show toolchain
        shell: bash
        run: |
          set -euo pipefail
          nub --version
          node --version
          nub node which

      - name: Install dependencies
        shell: bash
        run: nub install --frozen-lockfile

      - name: Verify canonical portfolio
        shell: bash
        run: scripts/node-run.sh scripts/verify.mjs

      - name: Verify safe Analyze canary
        shell: bash
        run: nub run --node analyze -- --checks complexity src/analyze/policy.ts
