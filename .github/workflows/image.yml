name: Image Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: image-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build pi-env image artifact
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Build image locally
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: pi-env:ci

      - name: Smoke test image toolchain and prebuilt outputs
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm pi-env:ci node --version
          docker run --rm pi-env:ci nub --version
          docker run --rm pi-env:ci test -d /opt/pi-env/.pi/extensions/dev-tools/dist
          docker run --rm pi-env:ci nub run verify:install

      - name: Scan built image with Trivy
        shell: bash
        run: |
          set -euo pipefail
          image_tar="$RUNNER_TEMP/pi-env-image.tar"
          results_dir="$RUNNER_TEMP/trivy-results"
          results="$results_dir/trivy-image-results.json"
          cache_dir="$RUNNER_TEMP/trivy-cache"
          ignore_file="$GITHUB_WORKSPACE/.trivyignore.yaml"
          docker save pi-env:ci --output "$image_tar"
          chmod 0644 "$image_tar"
          mkdir -p "$cache_dir" "$results_dir"
          chmod 0777 "$cache_dir" "$results_dir"
          docker run --rm \
            --cap-drop=ALL \
            --security-opt=no-new-privileges \
            --read-only \
            --tmpfs /tmp:rw,noexec,nosuid,nodev \
            -e TRIVY_CACHE_DIR=/cache \
            -v "$image_tar:/image/pi-env-image.tar:ro" \
            -v "$cache_dir:/cache:rw" \
            -v "$results_dir:/results:rw" \
            -v "$ignore_file:/etc/trivy/.trivyignore.yaml:ro" \
            aquasec/trivy@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f \
            image \
            --input /image/pi-env-image.tar \
            --scanners vuln,secret,misconfig \
            --file-patterns pnpm:lock.yaml \
            --severity HIGH,CRITICAL \
            --ignorefile /etc/trivy/.trivyignore.yaml \
            --format json \
            --output /results/trivy-image-results.json \
            --exit-code 0 \
            --skip-version-check
          node scripts/trivy-image-summary.mjs "$results"

  publish:
    name: Publish pi-env image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and publish image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:main
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
