# ─── pi-env tmux config ──────────────────────────────────────────────────────
# Sourced from ~/.tmux.conf by setup.sh. Reload with: tmux source ~/.tmux.conf
#
# QoL + Gruvbox Dark theme. Kept minimal and portable — no prefix changes,
# no host-specific bindings.

# ── QoL ─────────────────────────────────────────────────────────────────────
set -g renumber-windows on        # re-index windows when one is closed
set -s escape-time 10             # near-instant Esc (default 500ms is painful)
set -g history-limit 50000
set -g mode-keys vi               # vi keys in copy-mode (j/k, v, y)
set -g status-keys vi             # vi keys in command prompt

# ── True color ───────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# ── OSC 8 hyperlinks + DCS passthrough ──────────────────────────────────────
set -ga terminal-features "*:hyperlinks"
set -g allow-passthrough on

# ── Gruvbox Dark ─────────────────────────────────────────────────────────────
set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#83a598"
set -g status-style "bg=#3c3836,fg=#a89984"
set -g status-left-length 30
set -g status-right-length 50
set -g status-left "#[bg=#504945,fg=#ebdbb2,bold] #S #[bg=#3c3836] "
set -g status-right "#[fg=#928374]%H:%M #[fg=#504945]│ #[fg=#a89984]%b %d "
set -g window-status-format "#[fg=#7c6f64] #I:#W "
set -g window-status-current-format "#[bg=#504945,fg=#fabd2f,bold] #I:#W "
set -g window-status-separator ""
set -g message-style "bg=#504945,fg=#ebdbb2"
set -g message-command-style "bg=#504945,fg=#ebdbb2"
set -g mode-style "bg=#504945,fg=#ebdbb2"
